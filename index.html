
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmos Daily • NASA APOD</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="app-container">
      <header class="main-header">
        <span class="badge">NASA Public API</span>
        <h1>Cosmos Daily</h1>
        <p class="subtitle">Astronomy Picture of the Day</p>
      </header>

      <div id="loader" class="skeleton-loader">
        <div class="skeleton-media"></div>
        <div class="skeleton-text title"></div>
        <div class="skeleton-text body"></div>
      </div>

      <article id="apod-card" class="content-card hidden">
        <div class="media-container" id="media-container">
          </div>
        
        <div class="info-section">
          <div class="meta-row">
            <time id="apod-date" class="date-badge"></time>
            <span id="apod-copyright" class="copyright-text"></span>
          </div>
          <h2 id="apod-title" class="apod-title"></h2>
          <p id="apod-explanation" class="apod-explanation"></p>
        </div>
      </article>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
